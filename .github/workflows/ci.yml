name: CI

on:
  push:
    branches: [master]
  pull_request:

jobs:
  quality-gates:
    runs-on: ubuntu-latest
    env:
      PYTEST_DISABLE_PLUGIN_AUTOLOAD: "1"

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt

      - name: Compile Python sources
        run: python -m compileall src utils tests *.py

      - name: Import smoke checks
        run: |
          python - <<'PY'
          import importlib

          for module_name in (
              "src.cognition.profile_matcher",
              "src.cognition.soft_scores",
              "src.monitoring.alert_rules",
              "src.perception.face_geometry",
              "src.visualization.instrument_layout",
              "src.visualization.landmark_overlay",
              "utils.fusion_summary",
          ):
              importlib.import_module(module_name)
          PY

      - name: Run pytest
        run: python -m pytest -q tests
